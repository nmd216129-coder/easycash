<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyCash - Tasks</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111827;
color:white;
}

header{
background:#16a34a;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:15px;
}

.card{
background:#1f2937;
padding:15px;
margin-bottom:15px;
border-radius:12px;
}

button{
width:100%;
padding:12px;
background:#16a34a;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#15803d;
}
</style>

</head>

<body>

<header>📋 Daily Tasks</header>

<div class="container">

<div class="card">
<h3>📘 Facebook Follow</h3>
<p>Reward: ৳25</p>
<button onclick="openFacebook()">Start Task</button>
</div>

<div class="card">
<h3>▶️ YouTube Subscribe</h3>
<p>Reward: ৳25</p>
<button onclick="openYouTube()">Start Task</button>
</div>

<div class="card">
<h3>👥 Invite One Friend</h3>
<p>Reward: ৳20</p>
<button onclick="alert('Referral system will be added soon!')">Start Task</button>
</div>

</div>

<script>
const tg = window.Telegram?.WebApp;
if(tg){
    tg.ready();
    tg.expand();
}

function openFacebook(){
    window.open("https://www.facebook.com/share/1ERvH8URum/","_blank");
}

function openYouTube(){
    window.open("https://www.youtube.com/@EasyCash-y2c","_blank");
}
</script>

</body>
</html>
