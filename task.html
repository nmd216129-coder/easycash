<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyCash - Tasks</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111827;
color:white;
}

header{
background:#16a34a;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:15px;
}

.card{
background:#1f2937;
padding:15px;
margin-bottom:15px;
border-radius:12px;
}

button{
width:100%;
padding:12px;
background:#16a34a;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#15803d;
}
</style>

</head>

<body>

<header>📋 Daily Tasks</header>

<div class="container">

<div class="card">
<h3>Join Telegram Channel</h3>
<p>Reward: 5 Coins</p>
<button>Start Task</button>
</div>

<div class="card">
<h3>Watch Video</h3>
<p>Reward: 10 Coins</p>
<button>Start Task</button>
</div>

<div class="card">
<h3>Invite One Friend</h3>
<p>Reward: 20 Coins</p>
<button>Start Task</button>
</div>

</div>

</body>
</html>
<button onclick="openFacebook()">Facebook Task</button>

<button onclick="openYouTube()">YouTube Task</button>
