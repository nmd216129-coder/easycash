<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyCash</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header class="header">
<div class="logo">
<h2>💸 EasyCash</h2>
</div>

<div class="profile">
<img src="https://i.imgur.com/Z6X9Z6X.png" class="avatar">
</div>
</header>

<section class="balance-card">

<h3>Available Balance</h3>

<h1 id="balance">৳0.00</h1>

<button id="withdrawBtn">
Withdraw
</button>

</section>

<section class="reward-box">

<div class="box">

<h4>Referral Bonus</h4>

<p>Invite Friends</p>

<span>+৳30</span>

</div>

<div class="box">

<h4>New User</h4>

<p>Signup Reward</p>

<span>+৳20</span>

</div>

</section>

<h3 class="title">
Today's Tasks
</h3>

<section class="task-list">

<div class="task">

<img src="facebook.png">

<div>

<h4>Facebook Follow</h4>

<p>Reward: ৳25</p>

</div>

<button class="task-btn">
Start
</button>

</div>

<div class="task">

<img src="youtube.png">

<div>

<h4>YouTube Subscribe</h4>

<p>Reward: ৳25</p>

</div>

<button class="task-btn">
Start
</button>

</div>
