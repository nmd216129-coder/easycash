
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyCash</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header class="topbar">
    <span class="menu">☰</span>
    <h2>Easy<span>Cash</span></h2>
    <span>🔔</span>
  </header>

  <div class="balance-card">
    <div>
      <p>মেইন ব্যালেন্স</p>
      <h1>100.00 টাকা</h1>
    </div>
    <div class="wallet">💳</div>
  </div>

  <div class="stats">

    <div class="card">
      <h4>আজকের এন্ট্রি</h4>
      <h2>0/10</h2>
    </div>

    <div class="card">
      <h4>মোট রেফারেল</h4>
      <h2>0</h2>
    </div>

    <div class="card">
      <h4>মোট এন্ট্রি</h4>
      <h2>0</h2>
    </div>

    <div class="card">
      <h4>মোট ইনকাম</h4>
      <h2>100 টাকা</h2>
    </div>

  </div>

  <h3 class="title">দ্রুত একশন</h3>

  <div class="actions">

    <div class="action">
      📝
      <p>টাস্ক করুন</p>
    </div>

    <div class="action">
      💵
      <p>উইথড্র করুন</p>
    </div>

  </div>

  <div class="bottom-nav">

    <div class="active">
      🏠
      <span>হোম</span>
    </div>

    <div>
      📋
      <span>টাস্ক</span>
    </div>

    <div>
      👥
      <span>রেফার</span>
    </div>

    <div>
      👤
      <span>প্রোফাইল</span>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
