<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyCash - Withdraw</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f4f6;
}

header{
background:#16a34a;
color:#fff;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

label{
display:block;
margin-top:15px;
margin-bottom:8px;
font-weight:bold;
}

select,input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

button{
margin-top:20px;
width:100%;
padding:14px;
background:#16a34a;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#15803d;
}
</style>

</head>

<body>

<header>💸 Withdraw</header>

<div class="container">

<div class="card">

<label>Payment Method</label>

<select>
<option>bKash</option>
<option>Nagad</option>
<option>Rocket</option>
</select>

<label>Account Number</label>

<input type="text" placeholder="01XXXXXXXXX">

<label>Amount</label>

<input type="number" placeholder="Minimum 100">

<button onclick="withdraw()">
Submit Withdraw
</button>

</div>

</div>

<script>
function withdraw(){
alert("Withdraw request submitted successfully.");
}
</script>

</body>
</html>
